<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="超级听记 Logo">
  <title>超级听记 — Mic Seal</title>
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- Stamp body -->
  <rect x="22" y="22" width="212" height="212" rx="20" fill="#fef2f2" stroke="url(#redGrad)" stroke-width="6"/>

  <!-- Inner double border -->
  <rect x="36" y="36" width="184" height="184" rx="14" fill="none" stroke="url(#redGrad)" stroke-width="2.5" opacity="0.55"/>

  <!-- Microphone icon (centered, red) -->
  <g fill="url(#redGrad)" transform="translate(128 108)">
    <!-- Capsule body -->
    <rect x="-14" y="-40" width="28" height="56" rx="14"/>
    <!-- U-shape stand arc -->
    <path d="M -28 -8 a 28 28 0 0 0 56 0" fill="none" stroke="url(#redGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Stand pole -->
    <rect x="-3" y="20" width="6" height="14"/>
    <!-- Stand base -->
    <rect x="-16" y="34" width="32" height="5" rx="2"/>
  </g>

  <!-- Chinese seal character "听" -->
  <text x="128" y="196" text-anchor="middle"
        font-family="'Songti SC','SimSun','PingFang SC','Noto Serif CJK SC',serif"
        font-size="42" font-weight="700" fill="url(#redGrad)" letter-spacing="2">听</text>
</svg>