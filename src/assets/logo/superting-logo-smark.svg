<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SuperTing — S with halo and side waves A">
  <title>SuperTing — S · halo · side waves A</title>
  <desc>A blue rounded square holds a white S with a soft cyan halo brushstroke. Three short audio waves flank each side, amplitude tapering outward.</desc>

  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0B3D91"/>
      <stop offset="100%" stop-color="#0A2E6E"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="40" ry="40" fill="url(#bgA)"/>

  <!-- S with halo brushstroke -->
  <text
    x="128" y="200"
    text-anchor="middle"
    font-family="'Futura', 'Avenir Next', 'Avenir', 'Trebuchet MS', sans-serif"
    font-size="200"
    font-weight="700"
    fill="none"
    stroke="#67B8E8"
    stroke-width="9"
    stroke-linejoin="round"
    opacity="0.35"
  >S</text>

  <text
    x="128" y="200"
    text-anchor="middle"
    font-family="'Futura', 'Avenir Next', 'Avenir', 'Trebuchet MS', sans-serif"
    font-size="200"
    font-weight="700"
    fill="#FFFFFF"
    stroke="#FFFFFF"
    stroke-width="3"
    stroke-linejoin="round"
  >S</text>

  <!--
    Side waves: three short curves on each side, each progressively
    shorter and fainter. Classic "sound radiating" feel.
  -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <path d="M 32 110 Q 42 128 32 146"  stroke-width="3.5" opacity="0.9"/>
    <path d="M 44 118 Q 51 128 44 138"  stroke-width="2.5" opacity="0.55"/>
    <path d="M 22 102 Q 36 128 22 154"  stroke-width="2"   opacity="0.3"/>

    <path d="M 224 110 Q 214 128 224 146" stroke-width="3.5" opacity="0.9"/>
    <path d="M 212 118 Q 205 128 212 138" stroke-width="2.5" opacity="0.55"/>
    <path d="M 234 102 Q 220 128 234 154" stroke-width="2"   opacity="0.3"/>
  </g>
</svg>