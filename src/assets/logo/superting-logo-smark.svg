<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SuperTing — S mark with app icon safe area">
  <title>SuperTing — S mark · app icon safe area</title>
  <desc>A blue rounded-square chip sits inside a transparent app icon safe area, holding a white S with a soft cyan halo and compact audio waves.</desc>

  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0B3D91"/>
      <stop offset="100%" stop-color="#0A2E6E"/>
    </linearGradient>
  </defs>

  <g id="app-icon-mark" transform="translate(20 20) scale(0.84375)">
    <rect width="256" height="256" rx="28" ry="28" fill="url(#bgA)"/>

    <!-- S with halo brushstroke -->
    <text
      x="136" y="196"
      text-anchor="middle"
      font-family="'Futura', 'Avenir Next', 'Avenir', 'Trebuchet MS', sans-serif"
      font-size="188"
      font-weight="700"
      fill="none"
      stroke="#67B8E8"
      stroke-width="9"
      stroke-linejoin="round"
      opacity="0.35"
    >S</text>

    <text
      x="136" y="196"
      text-anchor="middle"
      font-family="'Futura', 'Avenir Next', 'Avenir', 'Trebuchet MS', sans-serif"
      font-size="188"
      font-weight="700"
      fill="#FFFFFF"
      stroke="#FFFFFF"
      stroke-width="3"
      stroke-linejoin="round"
    >S</text>

    <!-- Compact side waves -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
      <path d="M 36 114 Q 46 128 36 142" stroke-width="3"   opacity="0.85"/>
      <path d="M 48 122 Q 54 128 48 134" stroke-width="2.2" opacity="0.5"/>

      <path d="M 220 114 Q 210 128 220 142" stroke-width="3"   opacity="0.85"/>
      <path d="M 208 122 Q 202 128 208 134" stroke-width="2.2" opacity="0.5"/>
    </g>
  </g>
</svg>
