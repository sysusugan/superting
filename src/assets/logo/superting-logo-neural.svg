<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SuperTing Tech Logo">
  <title>SuperTing — Neural Letters</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="stGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eb1ff"/>
      <stop offset="100%" stop-color="#a972ff"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5eb1ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5eb1ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="40" fill="url(#bgGrad)"/>

  <!-- Neural network nodes around the letters -->
  <g opacity="0.85">
    <circle cx="42"  cy="62"  r="4" fill="#5eb1ff"/>
    <circle cx="68"  cy="40"  r="3" fill="#a972ff"/>
    <circle cx="214" cy="68"  r="4" fill="#5eb1ff"/>
    <circle cx="188" cy="42"  r="3" fill="#a972ff"/>
    <circle cx="42"  cy="194" r="4" fill="#a972ff"/>
    <circle cx="68"  cy="216" r="3" fill="#5eb1ff"/>
    <circle cx="214" cy="190" r="4" fill="#a972ff"/>
    <circle cx="188" cy="214" r="3" fill="#5eb1ff"/>
  </g>

  <!-- Connecting thin lines (neural mesh) -->
  <g stroke="#5eb1ff" stroke-width="1" opacity="0.35" fill="none">
    <line x1="42" y1="62" x2="68" y2="40"/>
    <line x1="214" y1="68" x2="188" y2="42"/>
    <line x1="42" y1="194" x2="68" y2="216"/>
    <line x1="214" y1="190" x2="188" y2="214"/>
  </g>

  <!-- Soft glow behind letters -->
  <ellipse cx="128" cy="128" rx="80" ry="48" fill="url(#nodeGlow)" opacity="0.4"/>

  <!-- "ST" letterform — bold, modern, slightly rounded -->
  <g fill="url(#stGrad)">
    <!-- "S" constructed from rounded rect segments -->
    <path d="M 78 96
             h 44
             a 14 14 0 0 1 0 28
             h -28
             a 14 14 0 0 0 0 28
             h 44
             v 12
             h -44
             a 26 26 0 0 1 0 -52
             h 28
             a 2 2 0 0 0 0 -4
             h -44
             z"/>
    <!-- "T" constructed from horizontal top bar + vertical stem -->
    <path d="M 138 96
             h 60
             v 14
             h -23
             v 56
             h -14
             v -56
             h -23
             z"/>
  </g>

  <!-- Underline / soundwave accent below letters -->
  <g stroke-linecap="round">
    <line x1="68"  y1="184" x2="76"  y2="184" stroke="#5eb1ff" stroke-width="3"/>
    <line x1="84"  y1="184" x2="100" y2="184" stroke="#5eb1ff" stroke-width="5"/>
    <line x1="108" y1="184" x2="148" y2="184" stroke="#a972ff" stroke-width="6"/>
    <line x1="156" y1="184" x2="172" y2="184" stroke="#5eb1ff" stroke-width="5"/>
    <line x1="180" y1="184" x2="188" y2="184" stroke="#5eb1ff" stroke-width="3"/>
  </g>
</svg>